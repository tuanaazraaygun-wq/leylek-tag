# api.leylektag.com — ÖNERİLEN (in-memory Socket.IO ile uyumlu) tek upstream
#
# KÖK NEDEN: server.py içinde sio.emit / connected_users / active_boarding_qr_codes TEK Python
# process belleğindedir. /api/ → 8000 ve /socket.io/ → 8001 AYRI uvicorn ise:
#   - API 8000 üzerindeki emit'ler 8001'deki gerçek socket odalarına GİTMEZ
#   - QR cache, boarding token vb. iki süreçte AYRI kalır → ilk tarama fail, tekrar denemede tutarsızlık
#
# ÇÖZÜM A (rollback / stabil): Hem /api/ hem /socket.io/ AYNI socket_app sürecine (örn. 8001).

upstream leylek_unified_8001 {
    server 127.0.0.1:8001;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name api.leylektag.com;

    # ssl_certificate ...;

    location /socket.io/ {
        proxy_pass http://leylek_unified_8001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass http://leylek_unified_8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# --- İKİ SÜREÇ (8000 API + 8001 socket) SADECE şu koşulla güvenli ---
# API 8000 süreci HİÇ sio.emit / connected_users kullanmıyorsa ve tüm realtime Redis/message_queue
# ile 8001'e taşınmışsa. Bu repo monolith'te bu koşul SAĞLANMIYOR; split KULLANMAYIN.
